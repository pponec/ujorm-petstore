# Minimalist PostgreSQL configuration for a shared 6GB RAM server
# running alongside memory-intensive Java applications.

listen_addresses = '*'

# Limit the maximum number of concurrent connections
# Each connection consumes additional memory
max_connections = 50

# Memory settings
# Restrict shared memory to prevent starving Java applications
shared_buffers = 128MB

# Estimate of memory available for disk caching
effective_cache_size = 512MB

# Memory limit for maintenance operations like VACUUM or CREATE INDEX
maintenance_work_mem = 64MB

# Memory limit for internal sort operations and hash tables
work_mem = 4MB

# Write Ahead Log buffers
wal_buffers = 4MB